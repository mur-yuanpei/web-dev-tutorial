# --------------------------------------------------------------
# 生产环境 nginx 配置
# 一个容器做两件事：
#   1. 托管前端静态资源（React 打包出来的 index.html + 一堆 JS/CSS）
#   2. 把 /api/* 反向代理到后端 api 容器
#
# 为什么这样设计？
#   - 前端 fetch('/api/xxx') 是相对路径，浏览器请求同域 → 无 CORS
#   - 前端代码"开发/生产一份 URL"，不需要 build 时注入 API_BASE_URL
#   - nginx 静态托管性能高、缓存策略灵活
# --------------------------------------------------------------

server {
    listen 80;
    server_name _;

    # 静态资源根目录（Dockerfile 里从 builder 阶段 COPY 到这里）
    root /usr/share/nginx/html;
    index index.html;

    # 请求体最大 1MB —— 教程 Demo 不需要上传大文件；防 payload 攻击
    client_max_body_size 1m;

    # 关闭 nginx 版本号回显（少一点攻击面信息）
    server_tokens off;

    # docker compose 内部 DNS 服务地址（固定为 127.0.0.11）
    # 有了 resolver + set 变量形式的 proxy_pass，
    # nginx 不会在启动时就解析 upstream —— 而是每个请求到来时才查一次，
    # 这样即便 api 容器晚一步起来，web 也不会因"host not found"崩溃退出
    resolver 127.0.0.11 valid=10s;

    # ---------------- API 反代 ----------------
    # 匹配 /api 开头的路径 → 转到 docker network 里的 api 容器 3000 端口
    # 注意：用变量 $api_upstream，proxy_pass 保留 /api/xxx 前缀，
    # 因为后端 Hono 路由本身就是从 /api/... 开始的
    location /api {
        set $api_upstream http://api:3000;
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 长请求容忍时间
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ---------------- 静态资源 ----------------
    # Vite 打包出的 JS/CSS 文件名带 hash（如 index-abcd1234.js），
    # 内容一变文件名就变，所以可以放心长缓存 30 天 + immutable
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ---------------- SPA fallback ----------------
    # React Router 使用 history mode（URL 里没 #），
    # 用户直接访问 /courses/xxx 时 nginx 会找不到文件，
    # 需要 fallback 到 index.html，让前端 JS 接管路由
    location / {
        try_files $uri $uri/ /index.html;
    }
}
