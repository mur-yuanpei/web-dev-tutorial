# --------------------------------------------------------------
# CI: 代码质量门（非 main 分支 + PR 时触发）
# 目标：类型检查 + 构建 通过才允许合并到 main
# 不做部署，deploy.yml 负责部署（且只在 main 上触发）
# --------------------------------------------------------------

name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: lint + typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (biome)
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Test (vitest)
        run: bun run test

      - name: Build
        run: bun run build
