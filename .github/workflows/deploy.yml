# --------------------------------------------------------------
# Deploy: 构建 → 推腾讯云 TCR → self-hosted runner 在 CVM 本地部署
# 触发：main 分支推送 + 手动触发（可选跑 seed）
#
# 架构关键点：
#   - build 用 GitHub-hosted runner（免费机器）构建镜像并推 TCR
#   - deploy/seed 用 self-hosted runner（跑在 CVM 上）本地执行 docker compose
#   - CVM 不对公网开 SSH，只主动出方向连 GitHub —— 安全面最小
# --------------------------------------------------------------

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_seed:
        description: "同时重灌 seed（会清空教程内容表）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  # 腾讯云 TCR 企业版实例登录地址
  REGISTRY: imur-yuanpei.tencentcloudcr.com
  # TCR 命名空间（相当于 docker hub 里的 "用户名/组织名"）
  NAMESPACE: mur-yuanpei

jobs:
  # ---------------- Job 1: 构建两个镜像并推到 TCR ----------------
  build:
    name: Build & push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, web]
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # short sha 用作 immutable 版本锚点（回滚就靠它）
      - name: Compute image tag
        id: tag
        run: echo "value=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      # 登录腾讯云 TCR
      # 凭据存在 GitHub Secrets：TCR_USERNAME（数字 UIN） + TCR_PASSWORD
      - name: Login to TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      # docker/metadata-action 帮你生成规范的 tag 和 label
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/web-dev-tutorial-${{ matrix.service }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.value }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions 自带的缓存，per-service 隔离避免互踩
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ---------------- Job 2: 在 CVM 上直接部署（self-hosted runner） ----------------
  # runs-on: self-hosted → GitHub 会把此 job 派发到 CVM 上的 runner 进程
  # 命令直接在 CVM 本地执行，无需 SSH
  deploy:
    name: Deploy on CVM
    needs: build
    runs-on: self-hosted
    if: github.event_name == 'push'  # 手动触发只用于 seed，不做部署
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync compose file to /opt/web-tutor
        run: cp deploy/docker-compose.prod.yml /opt/web-tutor/

      - name: Pull, migrate, up
        working-directory: /opt/web-tutor
        run: |
          set -euo pipefail

          IMAGE_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "→ 将部署到 IMAGE_TAG=${IMAGE_TAG}"

          # 用 sed 修改 .env.prod 里的 IMAGE_TAG（保留 POSTGRES_PASSWORD 等其他字段）
          if grep -q '^IMAGE_TAG=' .env.prod; then
            sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env.prod
          else
            echo "IMAGE_TAG=${IMAGE_TAG}" >> .env.prod
          fi

          # 1. 拉最新镜像
          docker compose --env-file .env.prod -f docker-compose.prod.yml pull

          # 2. 先起 pg
          docker compose --env-file .env.prod -f docker-compose.prod.yml up -d postgres

          # 3. 单独跑 migration（不塞进 api 容器 entrypoint 是有意的：
          #    未来横向扩容多副本时避免竞争；且发布流程能显式看到"改表"这一步）
          docker compose --env-file .env.prod -f docker-compose.prod.yml \
            run --rm api bun run apps/api/src/db/migrate.ts

          # 4. 启动 api + web，替换旧容器
          docker compose --env-file .env.prod -f docker-compose.prod.yml \
            up -d --remove-orphans api web

          # 5. 清理无引用的旧镜像层
          docker image prune -f

  # ---------------- Job 3: 手动触发时的 seed ----------------
  seed:
    name: Seed tutorial content
    needs: build
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' && inputs.run_seed == 'true'
    steps:
      - name: Run seed inside api container
        working-directory: /opt/web-tutor
        run: |
          set -euo pipefail
          docker compose --env-file .env.prod -f docker-compose.prod.yml \
            run --rm api bun run apps/api/src/db/seed.ts
