# --------------------------------------------------------------
# Deploy: 构建 → 推 GHCR → SSH 到 CVM 部署
# 触发：main 分支推送 + 手动触发（可选跑 seed）
# --------------------------------------------------------------

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_seed:
        description: "同时重灌 seed（会清空教程内容表）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# GITHUB_TOKEN 需要 packages: write 才能推 GHCR
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  # ---------------- Job 1: 构建两个镜像并推到 GHCR ----------------
  build:
    name: Build & push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, web]
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # short sha 用作 immutable 版本锚点（回滚就靠它）
      - name: Compute image tag
        id: tag
        run: echo "value=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/metadata-action 帮你生成规范的 tag 和 label
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/web-dev-tutorial-${{ matrix.service }}
          # GHCR 上 owner 需要 lowercase，metadata-action 自动处理
          tags: |
            type=raw,value=${{ steps.tag.outputs.value }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions 自带的缓存，per-service 隔离避免互踩
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ---------------- Job 2: SSH 到 CVM 更新服务 ----------------
  deploy:
    name: Deploy to CVM
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'  # 手动触发只用于 seed，不做部署
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 把 compose 文件同步到服务器（跟着代码走，学生改了立即生效）
      - name: SCP compose file to CVM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CVM_HOST }}
          port: ${{ secrets.CVM_PORT || 22 }}
          username: ${{ secrets.CVM_USER }}
          key: ${{ secrets.CVM_SSH_KEY }}
          source: "deploy/docker-compose.prod.yml"
          target: "/opt/web-tutor/"
          # scp-action 默认会把整个 deploy/ 目录都拷过去；此处只要一个 yml
          strip_components: 1

      - name: SSH & deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CVM_HOST }}
          port: ${{ secrets.CVM_PORT || 22 }}
          username: ${{ secrets.CVM_USER }}
          key: ${{ secrets.CVM_SSH_KEY }}
          # 环境变量传给 SSH 会话
          envs: IMAGE_TAG
          script_stop: true  # 任何一步出错就中止
          script: |
            set -euo pipefail
            cd /opt/web-tutor

            # 覆写 .env.prod 里的 IMAGE_TAG 到本次的 sha
            # 用 sed 修改而不是整个重写，保留其他运维手工调过的字段
            IMAGE_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
            if grep -q '^IMAGE_TAG=' .env.prod; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env.prod
            else
              echo "IMAGE_TAG=${IMAGE_TAG}" >> .env.prod
            fi
            echo "→ 将部署到 IMAGE_TAG=${IMAGE_TAG}"

            # 1. 拉最新镜像
            docker compose --env-file .env.prod -f docker-compose.prod.yml pull

            # 2. 先起 pg
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d postgres

            # 3. 单独跑 migration（不塞进 api 容器 entrypoint 是有意的：
            #    未来横向扩容多副本时避免竞争；且发布流程能显式看到"改表"这一步）
            docker compose --env-file .env.prod -f docker-compose.prod.yml \
              run --rm api bun run apps/api/src/db/migrate.ts

            # 4. 启动 api + web，替换旧容器
            docker compose --env-file .env.prod -f docker-compose.prod.yml \
              up -d --remove-orphans api web

            # 5. 清理无引用的旧镜像层
            docker image prune -f

  # ---------------- Job 3: 手动触发时的 seed ----------------
  seed:
    name: Seed tutorial content
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_seed == 'true'
    steps:
      - name: SSH & seed
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CVM_HOST }}
          port: ${{ secrets.CVM_PORT || 22 }}
          username: ${{ secrets.CVM_USER }}
          key: ${{ secrets.CVM_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/web-tutor
            docker compose --env-file .env.prod -f docker-compose.prod.yml \
              run --rm api bun run apps/api/src/db/seed.ts
