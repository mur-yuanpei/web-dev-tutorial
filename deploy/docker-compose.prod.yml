# --------------------------------------------------------------
# 生产环境 Docker Compose 编排（部署到腾讯云 CVM 用）
#
# 与项目根的 docker-compose.yml 的区别：
#   - 根 compose：只跑 postgres，给本地开发用（前后端 bun run dev 在宿主机上跑）
#   - 本 compose：把 postgres + api + web 三个服务全部容器化，用于生产/自测
#
# 使用方式：
#   本地自测：
#     IMAGE_TAG=local IMAGE_REGISTRY=. \
#       docker compose --env-file deploy/.env.prod \
#         -f deploy/docker-compose.prod.yml up -d
#     （镜像名会展开成 ".api:local" / ".web:local"，需先本地 build 打这两个 tag）
#
#   生产部署（GitHub Actions 从 CVM 上跑）：
#     IMAGE_TAG=sha-abc1234 IMAGE_REGISTRY=ghcr.io/mur-yuanpei/ \
#       docker compose -f docker-compose.prod.yml pull
# --------------------------------------------------------------

services:
  # ---------------- PostgreSQL ----------------
  postgres:
    image: postgres:16-alpine
    container_name: web-tutor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-webtutor}
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 必须在 .env.prod 里设置}
    # 生产环境不对外暴露 5432 —— 只在 docker 内部网络里访问，
    # 避免公网扫描器直接怼数据库
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev} -d ${POSTGRES_DB:-webtutor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------- Backend API ----------------
  api:
    # ${IMAGE_REGISTRY} 只在**未定义**时用默认值；.env.prod 里显式设为空串会保留空串
    # 生产：ghcr.io/mur-yuanpei/  → 拼出 ghcr.io/mur-yuanpei/web-dev-tutorial-api:xxx
    # 本地自测：留空          → 拼出 web-dev-tutorial-api:local
    image: ${IMAGE_REGISTRY-ghcr.io/mur-yuanpei/}web-dev-tutorial-api:${IMAGE_TAG:-latest}
    container_name: web-tutor-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: "3000"
      DATABASE_URL: postgres://${POSTGRES_USER:-dev}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-webtutor}
    # api 也不对外暴露端口 —— 只走 web 容器的 nginx 反代
    expose:
      - "3000"
    # Dockerfile 里已经声明了 HEALTHCHECK，这里不重复

  # ---------------- Frontend (nginx) ----------------
  web:
    image: ${IMAGE_REGISTRY-ghcr.io/mur-yuanpei/}web-dev-tutorial-web:${IMAGE_TAG:-latest}
    container_name: web-tutor-web
    restart: unless-stopped
    depends_on:
      - api
    # web 是唯一对公网暴露的入口 —— 80 端口
    ports:
      - "80:80"

volumes:
  pgdata:
    name: web-tutor-pgdata
